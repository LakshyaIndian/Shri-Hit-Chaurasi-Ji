<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#9A3400"/>
    </linearGradient>
    <linearGradient id="pageL" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFE8B0"/>
      <stop offset="100%" stop-color="#FFFCF0"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE8B0"/>
      <stop offset="100%" stop-color="#FFF8E8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="20"/>

  <!-- Book group with shadow -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M256,138 C232,135 144,147 98,164 L98,374 C144,358 232,350 256,354 Z"
          fill="url(#pageL)"/>
    <!-- Right page -->
    <path d="M256,138 C280,135 368,147 414,164 L414,374 C368,358 280,350 256,354 Z"
          fill="url(#pageR)"/>
  </g>

  <!-- Top cover edge -->
  <path d="M98,164 Q256,132 414,164" fill="none" stroke="#6B2200" stroke-width="7" stroke-linecap="round"/>
  <!-- Bottom cover edge -->
  <path d="M98,374 Q256,394 414,374" fill="none" stroke="#6B2200" stroke-width="7" stroke-linecap="round"/>

  <!-- Spine -->
  <rect x="247" y="132" width="18" height="228" fill="#6B2200" rx="5"/>

  <!-- Left page text lines -->
  <line x1="126" y1="214" x2="241" y2="212" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="126" y1="250" x2="241" y2="248" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="126" y1="286" x2="241" y2="284" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="126" y1="322" x2="241" y2="320" stroke="#C07020" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="126" y1="358" x2="196" y2="356" stroke="#C07020" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Right page text lines -->
  <line x1="271" y1="212" x2="386" y2="214" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="271" y1="248" x2="386" y2="250" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="271" y1="284" x2="386" y2="286" stroke="#C07020" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="271" y1="320" x2="386" y2="322" stroke="#C07020" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="316" y1="356" x2="386" y2="358" stroke="#C07020" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- "श्री" on left page -->
  <text x="181" y="202"
        font-family="Georgia,'Times New Roman',serif"
        font-size="44"
        fill="#7A2A00"
        text-anchor="middle"
        font-weight="bold">श्री</text>

  <!-- "हित" on right page -->
  <text x="331" y="202"
        font-family="Georgia,'Times New Roman',serif"
        font-size="44"
        fill="#6B2000"
        text-anchor="middle"
        font-weight="bold">हित</text>

  <!-- Decorative divider dots along spine bottom -->
  <circle cx="256" cy="388" r="6" fill="#6B2200" opacity="0.7"/>
  <circle cx="256" cy="404" r="4" fill="#6B2200" opacity="0.4"/>
</svg>
