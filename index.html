<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shri Hit Chaurasi Ji</title>
    <style>
        :root {
            --bg: #FFFAF0; --primary: #FF8C00; --text: #2F4F4F;
            --card-bg: #FFFFFF; --accent: #2E7D32; --error: #D32F2F;
        }
        [data-theme="dark"] {
            --bg: #121212; --primary: #E67E00; --text: #E0E0E0;
            --card-bg: #1E1E1E; --accent: #81C784; --error: #FF5252;
        }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', 'Devanagari', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        header { 
            background: var(--primary); color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }

        /* Tab Management */
        #tab-pads, #tab-grid { display: none; padding: 20px; padding-bottom: 100px; }
        .active-tab { display: block !important; }

        .mode-bar {
            background: var(--card-bg); overflow-x: auto; display: flex; gap: 8px;
            padding: 10px; border-bottom: 1px solid #444; position: sticky; top: 55px; z-index: 999;
            <button class="btn" onclick="setMode('shuffle', this)">क्रम सुधार</button>
        }
        .btn { background: #eee; border: none; padding: 8px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        [data-theme="dark"] .btn { background: #333; color: #ccc; }
        .btn.active { background: var(--primary); color: white; }

        /* Small Grid Access Box */
        .grid-trigger {
            background: var(--primary); color: white; padding: 10px; border-radius: 8px;
            margin-bottom: 15px; text-align: center; cursor: pointer; font-weight: bold;
        }

        /* Grid Tab Styles */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .grid-item { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border: 1px solid #888; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .grid-item.mastered { background: var(--accent); color: white; }
        .grid-item.learning { background: #FFD54F; color: black; }

        /* Pad Card & Features */
        .pad-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .line { font-size: 1.35rem; line-height: 2; margin-bottom: 8px; border-bottom: 1px solid #f0f0f033; }
        
        /* Reveal Logic */
        .hidden-line { display: none; }
        .hidden-word { color: transparent; background: #88888844; border-radius: 4px; padding: 0 4px; cursor: pointer; }

/* Shuffle Mode Styles */
.shuffle-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
}

.shuffle-item {
    background: var(--card-bg);
    padding: 12px;
    border: 1px solid #888;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1.4;
    transition: all 0.2s ease;
}

/* Correct selection turns Green */
.shuffle-item.correct {
    background: var(--accent) !important;
    color: white !important;
    border-color: var(--accent);
    cursor: default;
}

/* Wrong selection shake effect */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

.shuffle-item.wrong {
    border-color: var(--error);
    animation: shake 0.3s;
}
        
        /* Writing Mode */
        .writing-input { width: 100%; font-size: 1.2rem; padding: 12px; border-radius: 8px; border: 2px solid #888; background: var(--card-bg); color: var(--text); }
        .writing-input.wrong { border-color: var(--error); }

        footer { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); border-top: 1px solid #444; display: flex; justify-content: space-around; padding: 12px; z-index: 1000;}
    </style>
</head>
<body data-theme="light">

<header>
    <div style="font-weight: bold;">Shri Hit Chaurasi Ji</div>
    <div onclick="toggleTheme()" id="theme-btn" style="cursor:pointer;">🌙 Dark</div>
</header>

<div id="tab-pads" class="active-tab">
    <div class="grid-trigger" onclick="switchTab('grid')">📊 प्रोग्रेस ग्रिड (1-84) देखें</div>
    
    <div class="mode-bar">
        <button class="btn active" onclick="setMode('reading', this)">मूल पाठ</button>
        <button class="btn" onclick="setMode('line-reveal', this)">पंक्ति-प्रकट</button>
        <button class="btn" onclick="setMode('word-reveal', this)">शब्द-प्रकट</button>
        <button class="btn" onclick="setMode('writing', this)">लेखन</button>
        <button class="btn" onclick="toggleVertical(this)">दृश्य: एकल</button>
    </div>

    <div id="pad-container"></div>
</div>

<div id="tab-grid">
    <button class="btn" onclick="switchTab('pads')" style="margin-bottom: 20px;">⬅ वापस पद पर</button>
    <div class="grid-container" id="grid-list"></div>
</div>

<footer id="nav-footer">
    <button class="btn" onclick="nav(-1)">पिछला पद</button>
    <button class="btn" onclick="nav(1)">अगला पद</button>
</footer>

    { n: 21, l: ["तेरे नैंन करत दोऊ चारी ।", "अति कुलकात समात नहीं कहुँ,", "मिले हैं कुंजबिहारी ।।", "बिथुरी माँग, कुसुम गिरि-गिरि परैं,", "लटकि रही लट न्यारी ।", "उर नख-रेख प्रगट देखियत है,", "कहा दुरावत प्यारी ॥", "परी है पीक सुभग गंडन पर,", "अधर निरंग सुकुमारी ।", "(जै श्री) हित हरिवंश रसिकनी भामिनि,", "आलस अंग-अंग भारी ॥ 21 ॥"] },
    { n: 22, l: ["नैनन पर वारौं कोटिक खंजन ।", "चंचल चपल अरुण अनियारे,", "अग्रभाग बन्यौ अंजन ।।", "रुचिर मनोहर वक्र बिलोकन,", "सुरत-समर-दल-गंजन ।", "(जै श्री) हित हरिवंश कहत न बनें छबि,", "सुखसमुद्र-मनरंजन ।।22।।"] },
    { n: 23, l: ["राधा प्यारी तेरे नैंन सलोल ।", "तैं निज भजन कनक तन जोवन,", "लियौ मनोहर मोल ।।", "अधर निरंग अलक लट छूटी,", "रंजित पीक कपोल ।", "तू रस मगन भई नहिं जानत,", "ऊपर पीत निचोल ।।", "कुच युग पर नख-रेख प्रगट मानौं,", "संकर सिर ससि टोल ।", "(जै श्री) हित हरिवंश कहत कछु भामिनि,", "अति आलस सों बोल ।॥23॥"] },
    { n: 24, l: ["आजु गोपाल रास रस खेलत,", "पुलिन कल्पतरु तीर री सजनी ।", "सरद विमल नभ चन्द्र विराजत,", "रोचक त्रिविध समीर री सजनी ।।", "चंपक बकुल मालती मुकुलित,", "मत्त मुदित पिक कीर री सजनी ।", "देसी सुधंग राग रंग नीकौ,", "ब्रज-जुवतिन की भीर री सजनी ।।", "मघवा मुदित निसान बजायौ,", "व्रत छाँड्यौ मुनि धीर री सजनी ।", "(जै श्री) हित हरिवंश मगन मन श्यामा,", "हरत मदन घन पीर री सजनी ।। 24।।"] },
    { n: 25, l: ["आजु नीकी बनी (श्री) राधिका नागरी ।", "ब्रज-जुवति-जूथ में रूप अरु चतुरई,", "शील सिंगार गुन सबन तें आगरी ।।", "कमल दक्षिण भुजा, वाम भुज अंस सखि,", "गावति सरस मिलि मधुर स्वर राग री ।", "सकल विद्या विदित रहसि हरिवंश हित,", "मिलत नव-कुंज वर श्याम बड़ भाग री ॥25॥"] },
    { n: 26, l: ["मोहनी मदन गोपाल की बाँसुरी ।", "माधुरी श्रवन पुट, सुनत सुनि राधिके !", "करत रति राज के ताप कौ नासु री ।", "सरद राका रजनि, विपिन वृन्दा सजनि,", "अनिल अति मंद सीतल सहित बासु री ।", "परम पावन पुलिन, भृंग-सेवित नलिन,", "कल्पतरु तीर बलवीर कृत रासु री ।", "सकल मंडल भलीं, तुम जु हरि सों मिलीं,", "बनी वर बनित उपमा कहौं कासु री।", "तुम जु कंचन तनी, लाल मर्कत मनी,", "उभय कल हंस हरिवंश बलि दासु री ॥26॥"] },
    { n: 27, l: ["मधुऋतु वृन्दावन आनन्द न थोर ।", "राजत नागरी नव कुशल किशोर ॥", "जूथिका जुगल रूप मंजरी रसाल ।", "विथकित अलि मधु-माधवी गुलाल ॥", "चंपक बकुल कुल विविध सरोज ।", "केतकी मेदिनी मद मुदित मनोज ।।", "रोचक रुचिर बहै त्रिविध समीर ।", "मुकुलित नूत नदत पिक-कीर ॥", "पावन पुलिन घन मंजुल निकुंज ।", "किसलय सैन रचित सुख-पुंज ॥", "मंजीर मुरज डफ मुरली मृदंग ।", "बाजत उपंग वीणा वर मुख चंग ।।", "मृगमद मलयज कुमकुम अबीर ।", "बंदन अगरसत सुरंगित चीर ॥", "गावत सुन्दरि हरि सरस धमार ।", "पुलकित खग-मृग बहत न वारि ।।", "(जै श्री) हित हरिवंश हंस-हंसिनी समाज ।", "ऐसे ही करौ मिलि जुग जुग राज ॥27॥"] },
    { n: 28, l: ["राधे देखि वन की बात ।", "ऋतु बसन्त अनंत मुकुलित, कुसुम अरु फल पात ।।", "वेनु धुनि नंदलाल बोली, सुनि व अरसात ।", "करत कतव विलम्ब भामिनि, वृथा औसर जात ॥", "लाल मर्कतमनि छबीलौ, तुम जु कंचन गात ।", "बनी श्रीहित हरिवंश जोरी, उभय गुन-गन-मात ॥28॥"] },
    { n: 29, l: ["ब्रज नव तरुणि-कदम्ब मुकुटमणि, श्यामा आजु बनी।", "नख-सिख लौं अँग-अंग माधुरी, मोहे श्याम धनी ।।", "यौं राजत कवरी गूँथित कच, कनक-कंज-वदनी ।", "चिकुर चंद्रिकन बीच अर्ध बिधु, मानौं ग्रसित फनी ।।", "सौभग रस सिर स्रवत पनारी, पिय सीमन्त ठनी ।", "भृकुटि काम-कोदंड नैंन-सर, कज्जल रेख अनी ।।", "तरल तिलक, ताटंक गंड पर, नासा जलज मनी ।", "दसन कुन्द, सरसाधर पल्लव, प्रीतम मन समनी ।।", "चिबुक मध्य अति चारु सहज सखि, साँवल बिंदुकनी ।", "प्रीतम प्राण रतन संपुट कुच, कंचुकि कसिब तनी ।।", "भुज-मृनाल बल हरत बलय जुत, परस सरस स्रवनी ।", "श्याम सीस तरु मनौ मिडवारी, रची रुचिर रवनी ।।", "नाभि गंभीर मीन मोहन मन, खेलन कौं हृदनी ।", "कृस कटि, पृथु नितम्ब किंकिनि व्रत, कदलि-खंभ जघनी ।।", "पद अम्बुज जावक जुत भूषण, प्रीतम उर अवनी ।", "नव-नव भाय विलोभि भाम इभ, बिहरत वर करिनी ।।", "(जै श्री) हित हरिवंश प्रसंशित श्यामा, कीरति विशद घनी ।", "गावत स्रवनन सुनत सुखाकर, विश्व दुरित दवनी ।॥29॥"] },
    { n: 30, l: ["देखत नवनिकुंज सुनि सजनी, लागत है अति चारु ।", "माधविका केतकी लता लै, रच्यौ मदन आगारु ।।", "सरद मास, राका निशि सीतल, मंद-सुगन्ध-समीर ।", "परिमल लुब्ध मधुब्रत विथकित, नदत कोकिला-कीर ॥", "बहुविधि रंग मृदुल किसलय दल, निर्मित पिय सखि सेज ।", "भाजन कनक विविध मधुपूरित, धरे धरनि पर हेज ।।", "तापर कुशल किशोर-किशोरी, करत हास-परिहास ।", "प्रीतम पानि उरज वर परसत, प्रिया दुरावत वास ।।", "कामिनि कुटिल भृकुटि अवलोकत, दिन प्रतिपद प्रतिकूल ।", "आतुर अति अनुराग विवस हरि, धाइ धरत भुज-मूल ।।", "नागर नीबी बन्धन मोचत, ऐंचत नील निचोल ।", "वधू कपट हठ कोप कहत कल, नेति नेति मधुबोल ।।", "परिरम्भन विपरित रति वितरत, सरस सुरत निजुकेलि ।", "इन्द्रनील मनिमय तरु मानौं, लसत कनक की बेलि ।।", "रतिरण मिथुन ललाट पटल पर, श्रमजल-सीकर संग ।", "ललितादिक अंचल झकझोरत, मन अनुराग अभंग ।।", "(जै श्री) हित हरिवंश यथामति बरनत, कृष्ण रसामृत सार ।", "स्रवन सुनत प्रापक रति राधा, पद-अम्बुज सुकुमार ॥30॥"] },
    { n: 31, l: ["आज अति राजत दम्पति भोर ।", "सुरत रंग के रस में भीने, नागरि-नवल किशोर ॥", "अंसन पर भुज दिये विलोकत, इन्दुबदन विवि ओर ।", "करत पान रस मत्त परस्पर, लोचन तृषित चकोर ॥", "छूटी लटन लाल मन करष्यौ, ये याके चित चोर ।", "परिरम्भन-चुम्बन मिल गावत, सुर मंदर कलघोर ॥", "पग डगमगत चलत वन बिहरत, रुचिर कुंज घनखोर ।", "(जै श्री) हित हरिवंश लाल-ललना मिलि, हियौ सिरावत मोर ॥31॥"] },
    { n: 32, l: ["आजु वन क्रीड़त श्यामा-श्याम ।", "सुभग बनी निशि शरद चाँदनी, रुचिर कुंज अभिराम ।।", "खंडन अधर करत परिरम्भन, ऐंचत जघन दुकूल।", "उर नख-पात तिरीछी चितवन, दंपति रस समतूल ।।", "वे भुज पीन पयोधर परसत, वामदृशा पिय हार ।", "बसनन पीक अलक आकर्षत, समर-स्रमित सतमार ।।", "पल-पल प्रबल चौंप रस-लम्पट, अति सुन्दर सुकुमार ।", "(जै श्री) हित हरिवंश आजु तृण टूटत, हौं बलि विशद बिहार ॥32॥"] },
    { n: 33, l: ["आजु वन राजत जुगल किशोर ।", "नंद नंदन वृषभानु नन्दिनी, उठे उनींदे भोर ।।", "डगमगात पग परत शिथिल गति, परसत नख ससि-छोर ।", "दसन-वसन खंडित मषि मंडित, गंड तिलक कछु थोर ॥", "दुरत न कच-करजन के रोके, अरुन नैंन अलिचोर ।", "(जै श्री) हित हरिवंश सँभार न तन-मन, सुरत-समुद्र झकोर ॥33॥"] },
    { n: 34, l: ["वन की कुंजन-कुंजन डोलन ।", "निकसत निपट साँकरी बीथिन, परसत नाहिं निचोलन ।।", "प्रात काल रजनी सब जागे, सूचत सुख दृग लोलन ।", "आलसवन्त अरुण अति व्याकुल, कछु उपजत गति गोलन ।।", "निर्त्तन भृकुटि वदन अम्बुज मृदु, सरस हास मधु बोलन ।", "अति आसक्त लाल अलि लम्पट, बस कीने बिनु मोलन ।।", "बिलुलित सिथिल श्याम छूटी लट, राजत रुचिर कपोलन ।", "रति विपरित चुम्बन परिरम्भन, चिबुक चारु टक टोलन ।।", "कबहुँ स्रमित किसलय सिज्या पर, मुख अंचल झक झोलन ।", "दिन हरिवंश दासि हिय सींचत, वारिधि केलि कलोलन ॥34॥"] },
    { n: 35, l: ["झूलत दोऊ नवल किशोर ।", "रजनी-जनित रंग सुख सूचत, अंग-अंग उठि भोर ।।", "अति अनुराग भरे मिलि गावत, सुर मंदर कल घोर ।", "बीच-बीच प्रीतम चित चोरत, प्रिया नैंन की कोर ॥", "अबला अति सुकुमार डरत मन, वर हिंडोर झकोर ।", "पुलकि-पुलकि प्रीतम उर लागत, दै नव उरज अँकोर ॥", "अरुझी विमल माल कंकन सौं, कुंडल सौं कच डोर ।", "वेपथ जुत बनैं विवेचित, आनंद बढ्यौ न थोर ॥", "निरखि निरखि फूलत ललितादिक, विवि मुख चन्द्र चकोर ।", "दै असीस हरिवंश प्रसंसत, करि अंचल की छोर ॥35॥"] },
    { n: 36, l: ["आज वन नीकौ रास बनायौ ।", "पुलिन पवित्र सुभग यमुना तट, मोहन बेनु बजायौ ।।", "कल कंकन किंकिनि नूपुर धुनि, सुनि खग-मृग सचु पायौ ।।", "जुवतिनु मण्डल मध्य श्याम घन, सारंग राग जमायौ ।।", "ताल मृदंग उपंग मुरज डफ, मिलि रस सिन्धु बढ़ायौ ।", "विविध विशद वृषभानु नन्दिनी, अंग सुधंग दिखायौ ।।", "अभिनय-निपुन लटकि लट लोचन, भृकुटि अनंग नचायौ।", "तत्ताथेई (ताथेई) धरत नूतन गति, पति ब्रजराज रिझायौ ।।", "सकल उदार नृपति चूड़ामणि, सुख-वारिद बरसायौ।", "परिरम्भन चुम्बन आलिंगन, उचित जुवति जन पायौ ।।", "बरसत कुसुम मुदित नभनायक, इन्द्र निसान बजायौ ।", "(जै श्री) हित हरिवंश रसिक राधापति, जस-वितान जग छायो ॥36॥"] },
    { n: 37, l: ["चलहि किन मानिनि कुंज कुटीर ।", "तो बिनु कुँवर कोटि बनिता जुत, मथत मदन की पीर ॥", "गद-गद सुर, विरहाकुल, पुलकित, स्रवत बिलोचन नीर ।", "क्वासि-क्वासि वृषभानु नन्दिनी, बिलपत विपिन अधीर ।।", "वंशी विसिख, व्याल मालावलि, पंचानन पिक कीर ।", "मलयज गरल, हुतासन मारुत, साखामृग रिपु चीर ॥", "(जै श्री) हित हरिवंश परम कोमल चित, चपल चली पिय तीर ।", "सुनि भयभीत बज्र को पंजर, सुरत-सूर रणधीर ॥37॥"] },
    { n: 38, l: ["बेगि चलहि उठि गहर करत कत, निकुंज बुलावत लाल ।", "हा राधा-राधिका पुकारत, निरखि मदन गज ढाल ।।", "करत सहाय शरद शशि मारुत, फूटि मिली उर माल ।", "दुर्गम तकत समर अति कातर, करहि न पिय प्रतिपाल ।।", "(जै श्री) हित हरिवंश चली अति आतुर, स्रवन सुनत तेहि काल।", "लै राखे गिरि-कुच बिच सुन्दर, सुरत-सूर ब्रजबाल ।।38।।"] },
    { n: 39, l: ["खेल्यौ लाल चाहत रखन ।", "रचि-रचि अपने हाथ सँवारयौ, निकुंज भवन ।।", "रजनी शरद मंद सौरभ सौं, शीतल पवन ।", "तो बिनु कुँवरि काम की वेदन, मेटव कवन ।।", "चलहि न चपल बाल-मृगर्नैनी, तजिव मवन ।", "(जै श्री) हित हरिवंश मिलव प्यारे की, आरति-दवन ॥39॥"] },
    { n: 40, l: ["बैठे लाल निकुंज भवन ।", "रजनी रुचिर, मल्लिका मुकुलित, त्रिविध पवन ।।", "तू सखि काम केलि, मनमोहन, मदन दवन ।", "वृथा गहर कत करत कृसोदरि, कारन कवन ॥", "चपल चली तन की सुध बिसरी, सुनत श्रवन ।", "(जै श्री) हित हरिवंश मिले रस-लंपट, राधिका रवन ।॥40॥"] },
    { n: 41, l: ["प्रीति की रीति रँगीलौई जानै।", "जद्यपि सकल लोक चूड़ामणि, दीन अपनपौ मानै ।।", "यमुना पुलिन निकुंज भवन में, मान मानिनी ठानै ।", "निकट नवीन कोटि कामिनि कुल, धीरज मनहिं न आनै ।।", "नस्वर नेह चपल मधुकर ज्यौं, आन-आन सौं बानै ।", "(जै श्री) हित हरिवंश चतुर सोई लालहिं, छाँड़ि मैंड़ पहिचानै ।।", "41।।"] }, // [cite: 165-168]
    { n: 42, l: ["प्रीति न काहू की कानि विचारै ।", "मारग अपमारग विथकित मन, को अनुसरत निवारै ।।", "ज्यौं सरिता सावन जल उमगत, सनमुख सिन्धु सिधारै ।", "ज्यौं नादहि मन दिये कुरंगन, प्रगट पारधी मारै ।।", "(जै श्री) हित हरिवंश हिलग सारंग ज्यौं, सलभ सरीरहि जारै ।", "नाइक निपुन नवल मोहन बिनु, कौन अपनपौ हारै ।।42।।"] }, // [cite: 168-171]
    { n: 43, l: ["अति नागरि वृषभानु किशोरी ।", "सुनि दूतिका चपल मृगर्नैनी,", "आकर्षत चितवत चित गोरी ।।", "श्रीफल उरज कंचन-सी देही,", "कटि केहरि गुण-सिंधु-झकोरी ।", "बैनी भुजंग, चन्द्रसत बदनी,", "कदलि जंघ, जलचर गति चोरी ॥", "सुनि हरिवंश आज रजनी-मुख,", "बन मिलाइ मेरी निज जोरी।", "यद्यपि मान समेत भामिनी,", "सुनि कत रहत भली जिय भोरी ।।43॥"] }, // [cite: 171-174]
    { n: 44, l: ["चलि सुन्दरि, बोली वृन्दावन ।", "कामिनि, कण्ठ लागि किन राजहि,", "तू दामिनि, मोहन नूतन घन ।।", "कंचुकि सुरंग, विविध रंग सारी,", "नख-जुग-ऊन बने तेरे तन ।", "ये सब उचित नवल मोहन कौं,", "श्रीफल कुच, जोवन आगम-धन ।।", "अतिसय प्रीति हुती अन्तर गति,", "(जै श्री) हित हरिवंश चली मुकुलित मन ।", "निविड़ निकुंज मिले रस-सागर,", "जीते सत रतिराज सुरत रन ।। 44 ।।"] }, // [cite: 174-177]
    { n: 45, l: ["आवत श्रीवृषभानु दुलारी ।", "रूप-रासि अति चतुर-शिरोमणि, अंग-अंग सुकुमारी ॥", "प्रथम उबटि, मज्जन करि सज्जित, नील-बरन तन सारी ।", "गूँथित अलक, तिलक कृत सुन्दर, सैंदुर माँग सँवारी ॥", "मृगज समान नैंन अंजन जुत, रुचिर रेख अनुसारी ।", "जटित लवंग ललित नासा पर, दसनावलि कृत कारी ।।", "श्रीफल उरज, कसूँभी कंचुकि कसि, ऊपर हार छबि न्यारी ।", "कृस कटि उदर गंभीर नाभिपुट, जघन नितम्बन भारी ॥", "मनौं मृणाल भूषण भूषित भुज, श्याम अंस पर डारी ।", "(जै श्री) हित हरिवंश जुगल करिनी-गज, बिहरत वन पिय-प्यारी ।।45॥"] }, // [cite: 177-183]
    { n: 46, l: ["विपिन घन कुंज रति केलि भुज मेलि रुचि,", "श्याम-श्यामा मिले शरद की जामिनी ।", "हृदै अति फूल सम तूल पिय नागरी,", "करिनि-करि मत्त मनौं विविध गुन रामिनी ।।", "सरस गति हास-परिहास आवेस बस,", "दलित दल मदन-बल कोक रस कामिनी ।", "(जै श्री) हित हरिवंश सुनि लाल लावन्य भिदे,", "प्रिया अति सूर सुख सुरत संग्रामिनी ।।46।।"] }, // [cite: 183-187]
    { n: 47, l: ["बन की लीला लालहि भावै ।", "पत्र-प्रसून बीच प्रतिबिंबहिं, नख-सिख प्रिया जनावै ।।", "सकुच न सकत प्रगट परिरम्भन, अलि लम्पट दुरि धावै ।", "संभ्रम देत कुलक कल कामिनि, रति-रण-कलह मचावै ॥", "उलटी सबै समुझि नैंननि में, अंजन रेख बनावै ।", "(जै श्री) हित हरिवंश प्रीति रीति बस, सजनी श्याम कहावै ।।", "47॥।"] }, // [cite: 187-190]
    { n: 48, l: ["बनी वृषभानु नन्दिनी आजु ।", "भूषन-वसन विविध पहिरे तन, पिय मोहन हित साजु ॥", "हाव-भाव लावन्य भृकुटि लट, हरत जुवति-जन पाजु ।", "ताल भेद औघर सुर सूचत, नूपुर किंकिणि बाजु ॥", "नव निकुंज अभिराम श्याम सँग, नीकौ बन्यौ समाजु ।", "(जै श्री) हित हरिवंश विलास-रास जुत, जोरी अविचल राजु ।।48॥"] }, // [cite: 190-193]
    { n: 49, l: ["देखि सखी राधा पिय केलि ।", "ये दोऊ खोरि, खिरक गिरि गहवर,", "बिहरत कुँवर कण्ठ भुज मेलि ॥", "ये दोऊ नवलकिशोर रूप निधि,", "विटप तमाल कनक मनौं बेलि ।", "अधर अदन चुम्बन-परिरम्भन,", "तन पुलकित आनंद रस झेलि ।।", "पट-बंधन कंचुकि कुच परसत,", "कोप कपट निरखत कर पेलि ।", "(जै श्री) हित हरिवंश लाल रस लंपट,", "धाइ धरत उर बीच सकेलि ।।49॥"] }, // [cite: 193-196]
    { n: 50, l: ["नवलनागरि नवल नागर किशोर मिलि,", "कुंज कोमल कमल दलन सिज्या रची ।", "गौर साँवल अंग रुचिर तापर मिले,", "सरस मनि नील मनों मृदुल कंचन खची ॥", "सुरत नीवी निबन्ध हेतु प्रिय मानिनी,", "प्रिया की भुजनि में कलह मोहन मची।", "सुभग श्रीफल उरज पानि परसत रोष,", "हुँकार गर्व दृग-भंगि भामिनी लची ॥", "कोक कोटिक रभस रहसि हरिवंश हित,", "विविध कल माधुरी किमपि नाहिन बची।", "प्रणयमय रसिक ललितादि लोचन चषक,", "पिवत मकरंद सुख-रासि अंतर सची ।।50।।"] }, // [cite: 196-201]
    { n: 51, l: ["दान दै री नवल किशोरी ।", "माँगत लाल लाड़िलौ नागर,", "प्रगट भई दिन-दिन की चोरी ।।", "नव नारंग कनक हीरावलि,", "विद्रुम सरस जलज मनि गोरी ।", "पूरित रस पीयूष जुगल घट,", "कमल कदलि खंजन की जोरी ॥", "तोपै सकल सौंज दामन की,", "कत सतरात कुटिल दृग भोरी।", "नूपुर रव किंकिनी पिसुन घर,", "(जै श्री) हित हरिवंश कहत नहिं थोरी ॥51।।"] }, // [cite: 201-204]
    { n: 52, l: ["देखौ माई, सुन्दरता की सींवाँ ।", "ब्रज नवतरुणि कदंब नागरी,", "निरखि करत अधग्रीवाँ ।।", "जो कोऊ कोटि कलप लगि जीवै,", "रसना कोटिक पावै ।", "तऊ रुचिर वदनारविंद की,", "श्यामा शोभा कहत न आवै ।।", "देव-लोक, भू-लोक, रसातल,", "सुनि कवि-कुल मति डरिये ।", "सहज माधुरी अंग-अंग की,", "कहि कासौं पटतरिये ।।", "(जै श्री) हित हरिवंश प्रताप, रूप, गुण,", "वय, बल, श्याम उजागर ।", "जाकी भ्रू-विलास बस पशुरिव,", "दिन विथकित रस सागर ।। 52।।"] }, // [cite: 204-208]
    { n: 53, l: ["देखौ माई अबला कै बल-रासि ।", "अति गज मत्त निरंकुश मोहन, निरखि बँधे लट-पासि ।।", "अब ही पंगु भई मन की गति, बिनु उद्दिम अनियास ।", "तब की कहा कहौं जब पिय प्रति, चाहत भृकुटि विलास ।।", "कच संजमन व्याज भुज दरसत, मुसिकन वदन विकास ।", "हा-हरिवंश अनीति रीति हित, कत डारत तन त्रास ।। 53।।"] }, // [cite: 208-212]
    { n: 54, l: ["नयौ नेह, नव रंग, नयौ रस, नवल श्याम वृषभानु किशोरी ।", "नव पीताम्बर, नवल चूनरी नई-नई बूँदन भीजत गोरी ॥", "नव वृन्दावन हरित मनोहर, नव चातक बोलत मोर-मोरी ।", "नव मुरली जु मलार नई गति, स्रवन सुनत आये घनघोरी ।।", "नव भूषण नव मुकुट बिराजत, नई-नई उरप लेत थोरी-थोरी ।", "(जै श्री) हित हरिवंश असीस देत मुख, चिरजीवौ भूतल यह जोरी ।।54"] }, // [cite: 212-216]
    { n: 55, l: ["आजु दोऊ दामिनि मिलि बहसी ।", "बिच लै श्याम घटा अति नूतन, ताके रंग रसी ।।", "एक चमकि चहुँ ओर सखी री, अपने सुभाय लसी ।", "आई एक सरस गहनी में, दुहुँ भुज बीच बसी ।।", "अम्बुज नील उभय विधु राजत, तिनकी चलन खसी ।", "(जै श्री) हित हरिवंश लोभ भेंटन मन, पूरन शरद शशी ॥55॥"] }, // [cite: 216-219]
    { n: 56, l: ["हौं बलिजाँऊ नागरी श्याम ।", "ऐसे ही रंग करौ निशि-वासर,", "वृन्दाविपिन कुटी अभिराम ॥", "हास विलास सुरत रस सींचन,", "पशुपति-दग्ध जिवावत काम।", "(जै श्री) हित हरिवंश लोल लोचन अलि,", "करहु न सफल सकल सुखधाम ।।5611"] }, // [cite: 219-221]
    { n: 57, l: ["प्रथम यथामति प्रणऊँ, श्रीवृन्दावन अति रम्य ।", "श्रीराधिका कृपा बिनु, सबके मनन अगम्य ।।", "वर यमुनाजल सींचन, दिनहीं शरद-बसंत ।", "विविध भाँति सुमनस के, सौरभ अलि-कुल मंत ।।", "अरुण नूत पल्लव पर, कूजत कोकिल कीर ।", "निर्तन करत सिखीकुल, अति आनन्द अधीर ।।", "बहत पवन रुचिदायक, शीतल-मंद-सुगंधु ।", "अरुण, नील, सित मुकुलित, जहाँ तहाँ पूषण-बंधु ॥", "अति कमनीय विराजत, मन्दिर नवल निकुंज ।", "सेवत सगन प्रीतिजुत, दिन मीनध्वज-पुंज ॥", "रसिक-रासि जहाँ खेलत, श्यामा-श्याम किशोर ।", "उभय-बाहु-परिरंजित, उठे उनींदे भोर ॥", "कनक कपिस पट शोभित, सुभग साँवरे अंग ।", "नील वसन कामिनि उर, कंचुकी कसूँभी सुरंग ॥", "ताल रबाब मुरज डफ, बाजत मधुर मृदंग ।", "वर बाँसुरी मुख चंग ॥", "दोऊ मिलि चाँचर गावत, गौरी राग अलाप ।", "मानस मृग बल बेधत, भृकुटि धनुष दृग चाँप ।।", "दोऊ कर तारिनु पटकत, लटकत इत उत जात।", "हो-हो-होरी बोलत, अति आनंद कुलकात ।।", "रसिक लाल पर मेलत, कामिनि बंदनधूरि ।", "पिय पिचकारिनु छिरकत, तकि-तकि कुमकुम पूरि ॥", "कबहुँ-कबहुँ चन्दन तरु, निर्मित तरल हिंडोल ।", "चढ़ि दोऊ जन झूलत, फूलत करत कलोल ।।", "वर हिंडोल झकोरन, कामिनि अधिक डरात ।", "पुलकि-पुलकि वेपथ अँग, प्रीतम उर लपटात ।।", "हित चिंतक निज-चेरिनु, उर आनन्द न समात।", "निरखि निपट नैंनन सुख, तृण तोरत बलि जात ।।", "अति उदार विवि सुन्दर, सुरत सूर सुकुमार ।", "(जै श्री) हित हरिवंश करौ दिन, दोऊ अचल बिहार ।।57।।"] }, // [cite: 221-235]
    { n: 58, l: ["तेरे हित लैन आई, वन तें श्याम पठाई,", "हरत कामिनि घन कदन काम कौ ।", "काहे कौं करत बाधा, सुनि री चतुर राधा,", "भेटि कैं मेटि री माई प्रगट जगत भौ ।।", "देखि री रजनी नीकी, रचना रुचिर पी की,", "पुलिन नलिन नभ उदित रोहिनी-धौं ।", "तू तौऽव सखी सयानी, तैं मेरी एकौ न मानी,", "हौं तोसौं कहत हारी जुवति जुगति सौं ।।", "मोहन लाल छबीलौ, अपने रंग रंगीलौ,", "मोहत बिहंग पशु मधुर मुरली रौ ।", "ते तौऽव गनत तन जीवन जोवन तव,", "(जै श्री) हित हरिवंश हरि भजहि भामिनि जौ ।।58।।"] }, // [cite: 235-241]
    { n: 59, l: ["यह जु एक मन बहुत ठौर करि, कहि कौनें सचु पायौ ।", "जहाँ-तहाँ विपति जार-जुवती लौं, प्रगट पिंगला गायौ ।।", "द्वै तुरंग पर जोर चढ़त हठ, परत कौन पै धायौ ।", "कहि धौं कौन अंक पर राखै, जो गनिका सुत जायौ ।।", "(जैश्री) हित हरिवंश प्रपंच बंच सब, काल व्याल कौ खायौ ।", "यह जिय जानि श्याम-श्यामा पद, कमल-संगी सिर नायौ ।।", "59 ||"] }, // [cite: 241-245]
    { n: 60, l: ["कहा कहौं इन नैंनन की बात ।", "ये अलि प्रिया-वदन-अम्बुज रस, अटके अनत न जात ।।", "जब-जब रुकत पलक सम्पुट लट, अति आतुर अकुलात ।", "लंपट लव निमेष अन्तर तें, अलप कलप सत सात ।।", "श्रुति पर कंज, दृगंजन कुच बिच, मृगमद है न समात।", "(जै श्री) हित हरिवंश नाभि-सर-जलचर, जाँचत साँवल गात ।।60।।"] }, // [cite: 245-248]
    { n: 61, l: ["आजु सखी वन में जु बने प्रभु, नाचत हैं ब्रजमंडन ।", "वैस किशोर जुवति अंसन पर, दिये विमल भुज दंडन ।।", "कोमल कुटिल अलक सुठि शोभित, अवलम्बित युग गंडन।", "मानहुँ मधुप थकित रस-लम्पट, नील कमल के खंडन ।।", "हास-विलास हरत सबकौ मन, काम समूह विहंडन ।", "(जै श्री) हित हरिवंश करत अपनौं जस, प्रगट अखिल ब्रह्मण्डन ।।61।।"] }, // [cite: 249-251]
    { n: 62, l: ["खेलत रास दुलहिनी दूलहु ।", "सुनहु न सखी सहित ललितादिक, निरखि-निरखि नैंनन किन फूलहु ॥", "अति कल मधुर महा मोहन धुनि, उपजत हंस सुता के कूलहु ।", "थेई-थेई बचन मिथुन मुख निसरत, सुनि-सुनि देह दशा किन भूलहु ॥", "मृदु पदन्यास उठत कुंकुम रज, अद्भुत बहत समीर दुकूलहु ।", "कबहुँ श्याम श्यामा दसनांचल, कच-कुच हार छुवत भुजमूलहु ।।", "अति लावन्य रूप अभिनय गुन, नाहिन कोटि काम समतूलहु ।", "भृकुटि विलास हास रस बरसत, (जै श्री) हित हरिवंश प्रेम रस झूलहु ।।62॥"] }, // [cite: 252-255]
    { n: 63, l: ["मोहन मदन त्रिभंगी ।। मोहन मुनि-मन-रंगी ।।", "मोहन मुनि सघन प्रगट परमानन्द, गुन गंभीर गुपाला ।", "सीस किरीट श्रवण मणि-कुण्डल, उर मंडित बनमाला ।।", "पीताम्बर तन-धातु विचित्रित, कल किंकिनि कटि चंगी ।", "नख-मनि तरनि चरन सरसीरुह, मोहन मदन त्रिभंगी ।।", "मोहन बेनु बजावै ।। इहि रव नारि बुलावै ।।", "आईं ब्रज नारि सुनत वंशी-रव, गृह पति बंधु बिसारे ।", "दरसन मदन गुपाल मनोहर, मनसिज ताप निवारे ।।", "हरषित वदन, बंक अवलोकन, सरस मधुर धुनि गावै ।", "मधुमय श्याम समान अधर धरि, मोहन बेनु बजावै ।।", "रास रच्यौ वन माहीं ।। विमल कलपतरु छाहीं ।।", "विमल कलपतरु तीर सुपेसल, शरद रैन वर चन्दा ।", "शीतल मंद सुगंध पवन बहै, तहाँ खेलत नंदनन्दा ॥", "अद्भुत ताल मृदंग मनोहर, किंकिणि शब्द कराहीं ।", "यमुना पुलिन रसिक रस-सागर, रास रच्यौ वन माहीं ।।", "देखत मधुकर केली ।। मोहे खग, मृग, बेली ।।", "मोहे मृग-धेनु सहित सुर-सुन्दरि, प्रेम मगन पट छूटे ।", "उडुगन चकित, थकित शशि मंडल, कोटि मदन मन लूटे ।।", "अधर पान परिरंभन अतिरस, आनंद मगन सहेली ।", "(जै श्री) हित हरिवंश रसिक सचु पावत, देखत मधुकर केली ॥63॥"] }, // [cite: 256-265]
    { n: 64, l: ["बेनु माई बाजै वंशीवट ।", "सदा बसंत रहत वृन्दावन, पुलिन पवित्र सुभग यमुना तट ।।", "जटित क्रीट, मकराकृत कुण्डल, मुख अरविन्द भँवर मानौं लट।", "दसनन कुंद कली छबि लज्जित, सज्जित कनक समान पीतपट ।।", "मुनि मन ध्यान धरत नहिं पावत, करत विनोद संग बालक भट।", "दास अनन्य भजन रस कारण, (जै श्री) हित हरिवंश प्रगट लीला नट ॥ 64 ।।"] }, // [cite: 266-269]
    { n: 65, l: ["मदन-मथन घन निकुंज खेलत हरि, राका रुचिर शरद रजनी ।", "यमुना पुलिन तट, सुर तरु के निकट, रचित रास चलि मिलि सजनी ।।", "बाजत मृदु मृदंग नाचत सबै सुधंग, तैं न श्रवन सुन्यौ बेनु-बजनी ।", "(जै श्री) हित हरिवंश प्रभु राधिका रवन मोकौं, भावै माई जगत भगत-भजनी ।।65॥"] }, // [cite: 270-272]
    { n: 66, l: ["बिहरत दोऊ प्रीतम कुंज ।", "अनुपम गौर श्याम तन शोभा, बन बरसत सुख पुंज ॥", "अद्भुत खेत महा मनमथ कौ, दुंदुभि भूषण-राव ।", "जूझत सुभट परस्पर अँग-अँग, उपजत कोटिक भाव ॥", "भर संग्राम स्रमित अति अबला, निद्रायत कल नैन ।", "पिय के अंक निसंक तंक तन, आलस जुत कृत सैन ।।", "लालन मिस आतुर पिय परसत, उरू नाभि उरजात ।", "अद्भुत छटा विलोकि अवनि पर, विथकित वेपथ गात ॥", "नागरि निरखि मदन-विष व्यापत, दियौ सुधाधर धीर।", "सत्वर उठे महा मधु पीवत, मिलत मीन मिव नीर ॥", "अबही मैं मुख मध्य बिलोके, बिंबाधर सु रसाल ।", "जाग्रत भ्रम भयौ परयौ मन, सत मनसिज कुल जाल ।।", "सकृदपि मयि अधरामृत मुपनय, सुन्दरि सहज सनेह ।", "तव पद-पंकज कौ निज मंदिर, पालय सखि ! मम देह ।।", "प्रिया कहत कहु कहाँ हुते पिय, नव-निकुंज-वर-राज ।", "सुन्दर वचन रचन कत बितरत, रति-लंपट बिनु काज ।।", "इतनौं श्रवन सुनत मानिनि मुख, अन्तर रह्यौ न धीर ।", "मति कातर विरहज दुख व्यापत, बहुतर स्वाँस समीर ॥", "(जै श्री) हित हरिवंश भुजन आकर्षे, लै राखे उर माँझ ।", "मिथुन मिलत जु कछुक सुख उपज्यौ, त्रुटि-लव मिव भई साँझ ॥66॥"] }, // [cite: 273-282]
    { n: 67, l: ["रुचिर राजत वधू कानन किशोरी ।", "सरस षोडस किये तिलक मृगमद दिये, मृगज लोचन उबटि अंग शिर खोरी ।।", "गंड पंडीर मंडित चिकुर चंद्रिका, मेदिनी कवरि गूँथित सुरंग डोरी ।", "श्रवन ताटंक कै चिबुक पर बिंदु दै, कसूँभी कंचुकि दुरे उरज फल कोरी ।।", "बलय कंकन दोत, नखन जावक जोत, उदर गुन रेख, पट नील, कटि थोरी ।", "सुभग जघन स्थली, कुनित किंकिनि भली, कोक संगीत रस-सिंधु झकझोरी ॥", "विविध लीला रचित, रहसि हरिवंश हित, रसिक सिरमौर राधा-रवन जोरी।", "भृकुटि निर्जित मदन, मंद सस्मित वदन, किये रस विवश घनश्याम पिय गोरी ॥67॥"] }, // [cite: 283-288]
    { n: 68, l: ["रास में रसिक मोहन बने भामिनी ।", "सुभग पावन पुलिन, सरस सौरभ नलिन, मत्त मधुकर निकर शरद की जामिनी ।।", "त्रिविध रोचक पवन, ताप दिनमनि दवन, तहाँ ठाड़े रवन संग सत कामिनी ।", "ताल बीना मृदंग, सरस नाचत सुधंग, एक तें एक संगीत की स्वामिनी ।।", "राग-रागिनि जमी, विपिन बरसत अमी, अधर बिंबन रमी मुरलि अभिरामिनी ।", "लाग कट्टर उरप, सप्त सुर सौं सुलप, लेत सुन्दर सुघर राधिका नामिनी ।।", "तत्त थेई-थेई करत, गतिव नूतन धरत, पलटि डगमग ढरत मत्त-गज-गामिनी ।", "धाइ नवरंग धरी, उरसि राजत खरी, (जै श्री) उभय कल हंस हरिवंश घन-दामिनी ।।68।।"] }, // [cite: 289-295]
    { n: 69, l: ["मोहिनी मोहन रंगे प्रेम सुरंगे, मत्त मुदित कल नाचत सुधंगे।", "सकल-कला प्रवीन, कल्यान रागिनी लीन, कहत न बनै माधुरी अंग-अंगे ।।", "तरनि-तनया तीर, त्रिविध सखी समीर, मानौं मुनि-व्रत धरयौ कपोती कोकिला कीर ।", "नागरि-नवकिशोर, मिथुन मनसि चोर, सरस गावत दोऊ मंजुल मन्दर घोर ॥", "कंकन-किंकिनि धुनि, मुखर नूपुरन सुनि ।", "(जै श्री) हित हरिवंश रस बरसै नव तरुनि ।।69॥"] }, // [cite: 296-299]

// App State
let state = {
    idx: 0, mode: 'reading', isVertical: false,
    status: JSON.parse(localStorage.getItem('chaurasi_status') || '{}'),
    revealedLines: 1, revealedWords: []
};

function toggleTheme() {
    const b = document.body;
    const isDark = b.getAttribute('data-theme') === 'dark';
    b.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').innerText = isDark ? "🌙 Dark" : "☀️ Light";
}

function switchTab(tab) {
    document.getElementById('tab-pads').classList.remove('active-tab');
    document.getElementById('tab-grid').classList.remove('active-tab');
    document.getElementById('tab-' + tab).classList.add('active-tab');
    if(tab === 'grid') renderGrid();
}

function renderGrid() {
    const list = document.getElementById('grid-list');
    list.innerHTML = '';
    for(let i=1; i<=84; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item ' + (state.status[i] === 'Mastered' ? 'mastered' : state.status[i] === 'Learning' ? 'learning' : '');
        item.innerText = i;
        item.onclick = () => { state.idx = i-1; switchTab('pads'); render(); };
        list.appendChild(item);
    }
}

function render() {
    const cont = document.getElementById('pad-container');
    cont.innerHTML = '';
    document.getElementById('nav-footer').style.display = state.isVertical ? 'none' : 'flex';

    if (state.isVertical) {
        chaurasiData.forEach((p, i) => cont.appendChild(createPadCard(p, i)));
    } else {
        cont.appendChild(createPadCard(chaurasiData[state.idx], state.idx));
    }
}

function createPadCard(pad, pIdx) {
    const card = document.createElement('div');
    card.className = 'pad-card';
    card.innerHTML = `<h3>पद ${pad.n}</h3>`;
    const body = document.createElement('div');

    if (state.mode === 'writing') {
        const display = document.createElement('div');
        const input = document.createElement('input');
        input.className = 'writing-input';
        input.placeholder = "अगली पंक्ति लिखें...";
        
        const refreshWrite = () => {
            display.innerHTML = pad.l.slice(0, state.revealedLines).map(l => `<div class="line">${l}</div>`).join('');
        };
        
        input.oninput = (e) => {
            const target = pad.l[state.revealedLines];
            if (target && target.startsWith(e.target.value)) {
                input.classList.remove('wrong');
                if (e.target.value === target) {
                    state.revealedLines++;
                    e.target.value = '';
                    refreshWrite();
                }
            } else { input.classList.add('wrong'); }
        };
        refreshWrite();
        body.appendChild(display);
        body.appendChild(input);
    }
        else if (state.mode === 'shuffle') {
    const shuffleCont = document.createElement('div');
    shuffleCont.className = 'shuffle-container';
    
    // Create an indexed map to track original order
    let linesWithIndex = pad.l.map((text, index) => ({ text, index }));
    
    // Shuffle the lines randomly
    let shuffledLines = [...linesWithIndex].sort(() => Math.random() - 0.5);
    
    let nextRequiredIndex = 0; // The index of the line the user MUST click next

    shuffledLines.forEach((lineObj) => {
        const item = document.createElement('div');
        item.className = 'shuffle-item';
        item.innerText = lineObj.text;

        item.onclick = () => {
            // Check if the clicked line is the correct next one in sequence
            if (lineObj.index === nextRequiredIndex) {
                item.classList.add('correct');
                item.onclick = null; // Disable further clicks on this item
                nextRequiredIndex++;
                
                // If all lines are correctly ordered
                if (nextRequiredIndex === pad.l.length) {
                    setTimeout(() => alert("जय श्री हित हरिवंश! आपने पद पूर्ण किया।"), 300);
                }
            } else {
                // Flash red if wrong
                item.classList.add('wrong');
                setTimeout(() => item.classList.remove('wrong'), 400);
            }
        };
        shuffleCont.appendChild(item);
    });
    body.appendChild(shuffleCont);
}
    else {
        pad.l.forEach((line, lIdx) => {
            const div = document.createElement('div');
            div.className = 'line';
            
            if (state.mode === 'line-reveal' && lIdx >= state.revealedLines) {
                div.innerText = "--- पंक्ति प्रकट करें ---";
                div.style.cursor = "pointer";
                div.onclick = () => { state.revealedLines++; render(); };
            } 
            else if (state.mode === 'word-reveal') {
                const words = line.split(' ');
                div.innerHTML = words.map((w, wIdx) => {
                    const id = `p${pIdx}l${lIdx}w${wIdx}`;
                    const isShown = state.revealedWords.includes(id);
                    return `<span class="${isShown ? '' : 'hidden-word'}" onclick="revealWord('${id}')">${w}</span>`;
                }).join(' ');
            }
            else { div.innerText = line; }
            body.appendChild(div);
        });
    }
    
    // Status Logic
    const sBar = document.createElement('div');
    sBar.style.marginTop = '15px';
    ['Reading', 'Learning', 'Mastered'].forEach(s => {
        const b = document.createElement('button');
        b.className = 'btn ' + (state.status[pad.n] === s ? 'active' : '');
        b.style.marginRight = '5px';
        b.innerText = s;
        b.onclick = () => { state.status[pad.n] = s; localStorage.setItem('chaurasi_status', JSON.stringify(state.status)); render(); };
        sBar.appendChild(b);
    });
    
    card.appendChild(body);
    card.appendChild(sBar);
    return card;
}

function revealWord(id) {
    if (!state.revealedWords.includes(id)) {
        state.revealedWords.push(id);
        render();
    }
}

function setMode(m, el) {
    state.mode = m; state.revealedLines = 1; state.revealedWords = [];
    document.querySelectorAll('.mode-bar .btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
}

function toggleVertical(el) {
    state.isVertical = !state.isVertical;
    el.innerText = state.isVertical ? "दृश्य: लंबवत" : "दृश्य: एकल";
    render();
}

function nav(dir) {
    state.idx = Math.max(0, Math.min(chaurasiData.length-1, state.idx + dir));
    state.revealedLines = 1; state.revealedWords = [];
    render();
}

render();
</script>
